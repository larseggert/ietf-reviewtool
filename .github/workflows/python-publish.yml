name: Upload Python Package

on:
  release:
    types: [published]

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - uses: astral-sh/setup-uv@v6
    - name: Build package
      run: uv build
    - name: Publish package
      run: uv publish --token ${{ secrets.PYPI_TOKEN }}
